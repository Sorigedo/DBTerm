name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_notes:
        description: '本次发布说明，会追加到 Release 正文顶部'
        required: false
        default: |
          ## 更新内容

          ### 1. 新增功能

          - 新增全局可收缩导出任务栏，导出期间可继续切换标签和操作数据库或终端。
          - 数据表、查询结果、整库备份、SQLite、DuckDB、MongoDB、Redis 与 GridFS 导出统一显示后台进度。

          ### 2. 修改功能

          - 显式事务脚本复用固定数据库会话，支持 MySQL 临时表和会话变量连续执行。
          - 批量 SQL 遇到首个错误后立即停止；显式事务自动回滚，后续语句明确标记为跳过。
          - MySQL UPSERT / REPLACE 等特殊语句的影响行数增加无歧义说明。

          ### 3. 改进优化

          - 完善多数据库方言的流式导出、Excel / JSON / Markdown 等格式处理与取消逻辑。
          - 导出成功记录自动清理，失败记录保留以便排查。
          - 完善 SQL 变量日期、表达式模式及执行预览。

permissions:
  contents: write

jobs:
  publish:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            experimental: false
          - label: macOS Intel
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            experimental: false
          - label: Windows x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles msi,nsis
            rust-targets: x86_64-pc-windows-msvc
            experimental: false
          - label: Windows ARM64
            os: windows-11-arm
            rust-target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --bundles nsis
            rust-targets: aarch64-pc-windows-msvc
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: app-version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          expected="v${{ steps.app-version.outputs.version }}"
          actual="${GITHUB_REF_NAME}"
          if [ "$actual" != "$expected" ]; then
            echo "Release tag must match package.json version: expected ${expected}, got ${actual}" >&2
            exit 1
          fi

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --runInBand

      - name: Build release assets
        env:
          APPLE_SIGNING_IDENTITY: '-'
        run: npm run tauri -- build ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbterm-${{ matrix.rust-target }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: app-version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          expected="v${{ steps.app-version.outputs.version }}"
          actual="${GITHUB_REF_NAME}"
          if [ "$actual" != "$expected" ]; then
            echo "Release tag must match package.json version: expected ${expected}, got ${actual}" >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Rename release assets
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.app-version.outputs.version }}"
          mkdir -p renamed-assets

          while IFS= read -r asset; do
            filename="$(basename "$asset")"
            case "$filename" in
              *.dmg)
                if [[ "$filename" == *aarch64* || "$filename" == *arm64* ]]; then
                  target="DBTerm-v${version}-macos-aarch64.dmg"
                else
                  target="DBTerm-v${version}-macos-x86_64.dmg"
                fi
                ;;
              *.msi)
                if [[ "$filename" == *aarch64* || "$filename" == *arm64* ]]; then
                  target="DBTerm-v${version}-windows-aarch64.msi"
                else
                  target="DBTerm-v${version}-windows-x86_64.msi"
                fi
                ;;
              *.exe)
                if [[ "$filename" == *aarch64* || "$filename" == *arm64* ]]; then
                  target="DBTerm-v${version}-windows-aarch64-setup.exe"
                else
                  target="DBTerm-v${version}-windows-x86_64-setup.exe"
                fi
                ;;
              *)
                continue
                ;;
            esac

            cp "$asset" "renamed-assets/$target"
          done < <(find release-assets -type f | sort)

      - name: List release assets
        shell: bash
        run: find renamed-assets -type f -maxdepth 1 -print | sort

      - name: Write release notes
        env:
          INPUT_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        shell: bash
        run: |
          if [ -n "${INPUT_RELEASE_NOTES:-}" ]; then
            printf '%s\n\n' "$INPUT_RELEASE_NOTES" > release-notes.md
          else
            cat > release-notes.md <<'EOF'
          ## 更新内容

          ### 1. 新增功能

          - 新增全局可收缩导出任务栏，导出期间可继续切换标签和操作数据库或终端。
          - 数据表、查询结果、整库备份、SQLite、DuckDB、MongoDB、Redis 与 GridFS 导出统一显示后台进度。

          ### 2. 修改功能

          - 显式事务脚本复用固定数据库会话，支持 MySQL 临时表和会话变量连续执行。
          - 批量 SQL 遇到首个错误后立即停止；显式事务自动回滚，后续语句明确标记为跳过。
          - MySQL UPSERT / REPLACE 等特殊语句的影响行数增加无歧义说明。

          ### 3. 改进优化

          - 完善多数据库方言的流式导出、Excel / JSON / Markdown 等格式处理与取消逻辑。
          - 导出成功记录自动清理，失败记录保留以便排查。
          - 完善 SQL 变量日期、表达式模式及执行预览。
          EOF
          fi

          cat >> release-notes.md <<'EOF'
          ## 安装包

          - macOS Apple Silicon：适用于 M1/M2/M3/M4 等 Apple Silicon 设备。
          - macOS Intel：适用于 Intel 芯片 Mac。
          - Windows x64：适用于主流 64 位 Windows 10 / Windows 11。
          - Windows ARM64：适用于 ARM64 Windows 设备，当前作为实验包提供。

          ## 发布说明

          - 本版本安装包由 GitHub Actions 自动构建。
          - macOS 未接入 Apple Developer 正式签名和公证前，首次打开可能需要在系统安全设置中允许。
          - Windows 未接入代码签名证书前，首次安装可能出现系统安全提示。
          - 发布前请下载对应平台安装包完成启动、连接、SSH、SQL 编辑器和设置页基础回归。
          EOF

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="v${{ steps.app-version.outputs.version }}"
          title="DBTerm ${tag}"

          retry() {
            local attempt=1
            local max_attempts=5
            local delay=10
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi
              echo "Command failed, retrying in ${delay}s (${attempt}/${max_attempts})..." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          release_state="unknown"
          for attempt in 1 2 3 4 5; do
            if gh release view "$tag" >/tmp/release-view.out 2>&1; then
              release_state="exists"
              break
            fi

            view_output="$(cat /tmp/release-view.out)"
            if echo "$view_output" | grep -Eiq 'not found|could not find|HTTP 404'; then
              release_state="missing"
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "$view_output" >&2
              echo "Unable to determine whether release ${tag} exists after ${attempt} attempts" >&2
              exit 1
            fi

            delay=$((10 * attempt))
            echo "Unable to fetch release ${tag}, retrying in ${delay}s (${attempt}/5)..." >&2
            sleep "$delay"
          done

          if [ "$release_state" = "exists" ]; then
            retry gh release edit "$tag" \
              --title "$title" \
              --notes-file release-notes.md \
              --draft=false \
              --prerelease=false \
              --latest
          elif [ "$release_state" = "missing" ]; then
            retry gh release create "$tag" \
              --title "$title" \
              --notes-file release-notes.md \
              --latest
          else
            echo "Unexpected release state: ${release_state}" >&2
            exit 1
          fi

          mapfile -t assets < <(find renamed-assets -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi

          retry gh release upload "$tag" "${assets[@]}" --clobber
